services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      POSTGRES_DB: catalog
      POSTGRES_USER: catalog_user
      POSTGRES_PASSWORD: catalog_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "catalog_user", "-d", "catalog"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks: [app_network]

  catalog-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.catalog
    container_name: catalog-service
    environment:
      CATALOG_DB_HOST: postgres
      CATALOG_DB_PORT: 5432
      CATALOG_DB_NAME: catalog
      CATALOG_DB_USER: catalog_user
      CATALOG_DB_PASSWORD: catalog_pass
      CATALOG_GRPC_HOST: 0.0.0.0
      CATALOG_GRPC_PORT: 50051
    ports:
      - "50051:50051"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks: [app_network]

  api-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: api-service
    environment:
      CATALOG_GRPC_TARGET: catalog-service:50051
      GRPC_TIMEOUT_SECONDS: 2.0
    ports:
      - "8000:8000"
    depends_on:
      - catalog-service
    restart: unless-stopped
    networks: [app_network]

networks:
  app_network:
    driver: bridge

volumes:
  postgres_data:
